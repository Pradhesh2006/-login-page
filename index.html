<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#4facfe,#00f2fe);
}

.container{
    width:320px;
    margin:150px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px gray;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    padding:10px 20px;
    display:block;
    margin:auto;
    cursor:pointer;
}

#result{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Login Page</h1>

<input type="text" id="username"
placeholder="Enter username">

<input type="password" id="password"
placeholder="Enter password">

<button onclick="login()">Login</button>

<p id="result"></p>

</div>

<script>

let attempts = 0;
let locked = false;

function login(){

if(locked)
{
document.getElementById("result").innerHTML =
"⏳ Account Locked! Try again after 30 seconds";
return;
}

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

if(user=="pradhesh" && pass=="cse2026")
{
document.getElementById("result").innerHTML =
"✅ Login Successful";

attempts = 0;
}
else
{
attempts++;

if(attempts >= 3)
{
locked = true;

document.getElementById("result").innerHTML =
"🚫 Too many failed attempts! Wait 30 seconds";

setTimeout(function(){

locked = false;
attempts = 0;

document.getElementById("result").innerHTML =
"✅ You can try again now";

},30000);

}
else
{
document.getElementById("result").innerHTML =
"❌ Wrong Username or Password";

}
}

}

</script>

</body>
</html>
